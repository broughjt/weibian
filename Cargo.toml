[package]
name = "weibian"
version = "1.0.0-rc.5"
edition = "2024"

[[bin]]
name = "wb"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5.40", features = ["derive", "env"] }
ecow = "0.2.5"
typst = "0.14.2"
figment = { version = "0.10.8", features = ["toml"] }
globset = "0.4.16"
walkdir = "2.5.0"
serde = { version = "1.0.210", features = ["derive"] }
